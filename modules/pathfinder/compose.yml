# modules/pathfinder/compose.yml
# pf2e-module: Pathfinder 2e DM co-pilot module (Phase 28 Path B reference implementation)
#
# Profile: pf2e  (D-10) — activate with: ./sentinel.sh --pf2e up
# Service name: pf2e-module  (D-17) — must match base_url in REGISTRATION_PAYLOAD
# Registry name: pathfinder  (D-11) — logical name in sentinel-core module registry
#
# D-12: Docker profile "pf2e" != module registry name "pathfinder" — two different identifiers.
# D-14: Module directory is modules/pathfinder/ (logical name) not modules/pf2e/.
services:
  pf2e-module:
    build:
      context: .
      dockerfile: Dockerfile
    profiles:
      - pf2e
    env_file:
      - ../../.env
    secrets:
      - sentinel_api_key
    environment:
      - SENTINEL_CORE_URL=http://sentinel-core:8000
      # OBSIDIAN_BASE_URL, OBSIDIAN_API_KEY, LITELLM_MODEL, LITELLM_API_BASE
      # are loaded from ../../.env via env_file above — do not set here or they
      # override the user-configured values silently (WR-03 fix)
      #
      # LiteLLM's openai/ provider requires an api_key. LM Studio ignores the
      # key (self-hosted OpenAI-compatible server) but LiteLLM refuses to call
      # without one. Any non-empty string works. Mirrors sentinel-core's
      # LiteLLMProvider(api_key="lmstudio") convention (main.py:91).
      - OPENAI_API_KEY=lmstudio
      # Session Notes (Phase 34 / SES-01..03, D-10, D-13, D-37)
      - SESSION_AUTO_RECAP=false
      - SESSION_TZ=America/New_York
      # SESSION_RECAP_MODEL: leave unset to fall back to LITELLM_MODEL
      # - SESSION_RECAP_MODEL=
      # Foundry VTT event ingest (Phase 35 / FVT-01..03, D-12, D-14)
      - DISCORD_BOT_INTERNAL_URL=http://discord-bot:8001
      # FOUNDRY_NARRATION_MODEL: leave unset to fall back to LITELLM_MODEL (D-12)
      # - FOUNDRY_NARRATION_MODEL=
    depends_on:
      sentinel-core:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/healthz"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s

secrets:
  sentinel_api_key:
    file: ../../secrets/sentinel_api_key
