name: Feature Request
description: Suggest a new module, interface, or core capability
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Got an idea for something the Sentinel should be able to do? Describe it here.

  - type: textarea
    id: problem
    attributes:
      label: Problem / motivation
      description: What problem does this solve, or what need does it address?
      placeholder: I want to be able to...
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: Describe the feature you'd like to see. How should it work?
      placeholder: |
        A new module that...
        It would...
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: Area
      description: What area of the project does this fall under?
      options:
        - new module
        - new interface
        - sentinel-core enhancement
        - documentation
        - other
    validations:
      required: true

  - type: checkboxes
    id: checklist
    attributes:
      label: Before submitting
      options:
        - label: I searched existing issues and this has not been requested before
          required: true
