name: Bug Report
description: Something isn't working as expected
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please fill out the sections below to help us reproduce and fix the issue.

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Describe what happened and what you expected to happen instead.
      placeholder: |
        What happened: ...
        What I expected: ...
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Step-by-step instructions to reproduce the issue.
      placeholder: |
        1. Start the stack with ...
        2. Send message ...
        3. See error ...
    validations:
      required: true

  - type: dropdown
    id: component
    attributes:
      label: Component
      description: Which component is affected?
      options:
        - sentinel-core
        - pi-harness
        - discord-interface
        - docs
        - other
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, Docker version, and LM Studio model loaded.
      placeholder: |
        OS: macOS 15.x / Ubuntu 24.04
        Docker: 27.x
        Model: llama-3.1-8b-instruct
    validations:
      required: true

  - type: checkboxes
    id: checklist
    attributes:
      label: Before submitting
      options:
        - label: I searched existing issues and this has not been reported before
          required: true
        - label: I have read the relevant documentation
          required: false
