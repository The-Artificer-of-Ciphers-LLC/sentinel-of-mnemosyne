name: CI

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      run_tests: ${{ steps.filter.outputs.run_tests }}
      run_docker: ${{ steps.filter.outputs.run_docker }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Determine changed files
        id: filter
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "run_tests=true" >> "$GITHUB_OUTPUT"
            echo "run_docker=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            BASE_SHA="${{ github.event.pull_request.base.sha }}"
            HEAD_SHA="${{ github.event.pull_request.head.sha }}"
          else
            BASE_SHA="${{ github.event.before }}"
            HEAD_SHA="${{ github.sha }}"
          fi

          CHANGED_FILES=$(git diff --name-only "$BASE_SHA" "$HEAD_SHA" || true)
          echo "$CHANGED_FILES"

          RUN_TESTS=false
          RUN_DOCKER=false

          while IFS= read -r file; do
            [[ -z "$file" ]] && continue

            if [[ "$file" =~ ^sentinel-core/ ]] || \
               [[ "$file" =~ ^shared/ ]] || \
               [[ "$file" == ".github/workflows/ci.yml" ]]; then
              RUN_TESTS=true
            fi

            if [[ "$file" =~ ^sentinel-core/ ]] || \
               [[ "$file" =~ ^shared/ ]] || \
               [[ "$file" == "sentinel-core/Dockerfile" ]] || \
               [[ "$file" == "docker-compose.yml" ]] || \
               [[ "$file" == ".github/workflows/ci.yml" ]]; then
              RUN_DOCKER=true
            fi
          done <<< "$CHANGED_FILES"

          echo "run_tests=$RUN_TESTS" >> "$GITHUB_OUTPUT"
          echo "run_docker=$RUN_DOCKER" >> "$GITHUB_OUTPUT"

  test:
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.run_tests == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install \
            "fastapi>=0.135.0" \
            "uvicorn[standard]>=0.44.0" \
            "pydantic>=2.7.0" \
            "pydantic-settings>=2.13.0" \
            "httpx>=0.28.1" \
            "tiktoken" \
            "litellm>=1.83.0,<2.0" \
            "tenacity>=8.2.0,<10.0" \
            "anthropic>=0.93.0,<1.0" \
            "numpy>=1.26,<3.0" \
            "PyYAML>=6.0,<7.0" \
            "pytest>=8.0" \
            "pytest-asyncio>=0.23" \
            "pytest-mock>=3.14.1" \
            "pytest-cov>=7.0.0"

      - name: Run tests
        working-directory: sentinel-core
        run: python -m pytest tests/ --tb=short

  docker-build:
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.run_docker == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Build sentinel-core image
        run: |
          docker build \
            -f sentinel-core/Dockerfile \
            --build-context shared=./shared \
            -t sentinel-core:ci \
            sentinel-core
