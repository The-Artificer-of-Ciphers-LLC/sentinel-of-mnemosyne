name: CI

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install \
            "fastapi>=0.135.0" \
            "uvicorn[standard]>=0.44.0" \
            "pydantic>=2.7.0" \
            "pydantic-settings>=2.13.0" \
            "httpx>=0.28.1" \
            "tiktoken" \
            "litellm>=1.83.0,<2.0" \
            "tenacity>=8.2.0,<10.0" \
            "anthropic>=0.93.0,<1.0" \
            "numpy>=1.26,<3.0" \
            "PyYAML>=6.0,<7.0" \
            "pytest>=8.0" \
            "pytest-asyncio>=0.23" \
            "pytest-mock>=3.14.1" \
            "pytest-cov>=7.0.0"
      - name: Run tests
        working-directory: sentinel-core
        run: python -m pytest tests/ --tb=short

  docker-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Build sentinel-core image
        run: |
          docker build \
            -f sentinel-core/Dockerfile \
            --build-context shared=./shared \
            -t sentinel-core:ci \
            sentinel-core
