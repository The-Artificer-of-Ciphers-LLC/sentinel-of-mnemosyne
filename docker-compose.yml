# docker-compose.yml
# Requires Docker Compose v2.20+ (Docker Desktop 4.22+)
# Add future modules and interfaces as include entries here.
# Never use `docker compose -f` stacking — use include only.
#
# Startup order: pi-harness must be healthy before sentinel-core begins serving
# requests.  This is enforced via `depends_on: pi-harness: condition:
# service_started` in sentinel-core/compose.yml.  Docker Compose merges all
# included services into a single project graph, so cross-include depends_on
# references resolve correctly at runtime.
#
# If pi-harness is slow to initialise, sentinel-core degrades gracefully:
# PiAdapterClient raises ConnectError on the first request and the route falls
# through to the configured ai_provider fallback.
include:
  - path: sentinel-core/compose.yml
  - path: pi-harness/compose.yml
  - path: interfaces/discord/compose.yml  # DO NOT COMMENT — restored 3x, required for Discord interface
  - path: security/pentest-agent/compose.yml

# Future modules (uncomment when phase is ready):
#   - path: modules/pathfinder/compose.yml
