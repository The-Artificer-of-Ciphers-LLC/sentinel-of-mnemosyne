# interfaces/discord/compose.yml
# Paths are resolved relative to this file's directory.
services:
  discord:
    build:
      context: ../..
      dockerfile: interfaces/discord/Dockerfile
    env_file:
      - ../../.env
    secrets:
      - discord_bot_token
      - sentinel_api_key
      - obsidian_api_key
    restart: unless-stopped
