# sentinel-core/compose.yml
# Paths are resolved relative to this file's directory.
services:
  sentinel-core:
    build:
      context: .
      dockerfile: Dockerfile
      additional_contexts:
        shared: ../shared
    ports:
      - "8000:8000"
    env_file:
      - ../.env
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    secrets:
      - obsidian_api_key
      - sentinel_api_key
      - lmstudio_api_key
      - anthropic_api_key
      - alpaca_paper_api_key
      - alpaca_paper_secret_key
      - alpaca_live_api_key
      - alpaca_live_secret_key
    restart: unless-stopped
