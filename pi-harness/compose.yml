# pi-harness/compose.yml
# Paths are resolved relative to this file's directory.
services:
  pi-harness:
    profiles: [pi]   # opt-in only; activated via `./sentinel.sh --pi`
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    env_file:
      - ../.env
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped
